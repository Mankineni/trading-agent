name: Weekly Review

on:
  schedule:
    # 19:00 UTC every Friday
    # = 20:00 CET (winter) / 21:00 CEST (summer)
    # Both are after EU close (17:30 CET) and US close (16:00 ET).
    # Pinned to UTC — no DST adjustment.
    - cron: "0 19 * * 5"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        run: python scripts/fetch_market_data.py

      - name: Configure git
        run: |
          git config user.name "trading-agent[bot]"
          git config user.email "trading-agent[bot]@users.noreply.github.com"

      - name: Run research agent
        uses: anthropics/claude-code-action@v1
        with:
          # TODO: if claude-opus-4-7 is rejected at runtime, switch to claude-sonnet-4-6
          model: claude-opus-4-7
          max_turns: 25
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a weekly trading research agent. Read CLAUDE.md for your full
            role and rules, then execute the steps below in order.

            ## 1. Read context
            Read every file in memory/ and skills/. Pay special attention to:
            - memory/market_snapshot.md  (fresh data — treat as authoritative)
            - memory/portfolio.md        (current holdings and rules)
            - memory/watchlist.md        (candidate tickers)
            - memory/trade_log.md        (your prior recommendations)
            - memory/learnings.md        (your prior reflections)

            ## 2. Grade last week
            If trade_log.md has entries from the most recent prior run, compare those
            picks against this week's market_snapshot.md prices. Note what went right,
            what went wrong, and why. Incorporate this into the Learnings section.

            ## 3. Produce this week's thesis
            Follow the output template in skills/research.md exactly.
            Write the full report to docs/latest.md (overwrite).

            Hard constraints — violating any of these is a failure:
            - NEVER invent, estimate, or hallucinate a price. Every number must come
              from market_snapshot.md or be explicitly marked "[estimated]".
            - Maximum 3 new BUY picks per week. Zero is valid and often correct.
            - Maximum 3 SELL picks per week.
            - Every pick MUST include a "Why I could be wrong" section.
            - Enforce all rules in skills/risk_check.md before recommending.

            ## 4. Update memory
            - Append this week's picks to memory/trade_log.md (use the format in CLAUDE.md).
            - Append reflections to memory/learnings.md (use the format in CLAUDE.md).
            - Do NOT modify memory/portfolio.md or memory/watchlist.md.

            ## 5. Render and commit
            Run: python scripts/render_dashboard.py
            Then commit all changed files:
              git add docs/ memory/trade_log.md memory/learnings.md
              git commit -m "weekly review: $(date -u +%Y-%m-%d)"

      - name: Push changes
        run: |
          git diff --quiet HEAD origin/$(git branch --show-current) 2>/dev/null || git push
