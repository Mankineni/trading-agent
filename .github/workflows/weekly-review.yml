name: Weekly Review

on:
  schedule:
    # 19:00 UTC every Friday
    # = 20:00 CET (winter) / 21:00 CEST (summer)
    # Both are after EU close (17:30 CET) and US close (16:00 ET).
    # Pinned to UTC — no DST adjustment.
    - cron: "0 19 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        run: python scripts/fetch_market_data.py

      - name: Configure git
        run: |
          git config user.name "trading-agent[bot]"
          git config user.email "trading-agent[bot]@users.noreply.github.com"

      - name: Bundle context for agent
        run: |
          {
            echo "===== CLAUDE.md ====="
            cat CLAUDE.md
            echo ""
            echo "===== skills/research.md ====="
            cat skills/research.md
            echo ""
            echo "===== skills/risk_check.md ====="
            cat skills/risk_check.md
            echo ""
            echo "===== memory/portfolio.md ====="
            cat memory/portfolio.md
            echo ""
            echo "===== memory/watchlist.md ====="
            cat memory/watchlist.md
            echo ""
            echo "===== memory/market_snapshot.md ====="
            cat memory/market_snapshot.md
            echo ""
            echo "===== memory/trade_log.md ====="
            cat memory/trade_log.md
            echo ""
            echo "===== memory/learnings.md ====="
            cat memory/learnings.md
          } > _context.md

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run research agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --model claude-opus-4-7 --max-turns 50 --dangerously-skip-permissions -p \
            "Read _context.md in the repo root — it has all your context \
            (CLAUDE.md, skills/*, memory/* concatenated). Then do exactly 3 file writes: \
            (1) Overwrite docs/latest.md with the weekly report following the research.md \
            template. Use only prices from market_snapshot. Never invent numbers. Max 1 \
            new BUY per portfolio rules. Every pick needs 'Why I could be wrong'. If no \
            prior picks exist, write 'First run — no prior picks to grade' in the retro. \
            (2) Append a '## $(date -u +%Y-%m-%d)' section to memory/trade_log.md with \
            picks or '**No picks this week.**' \
            (3) Append a '## $(date -u +%Y-%m-%d)' section to memory/learnings.md with \
            1-3 bullet reflections. Then STOP."

      - name: Render dashboard
        run: python scripts/render_dashboard.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add docs/ memory/trade_log.md memory/learnings.md memory/market_snapshot.md
          git diff --cached --quiet || git commit -m "weekly review: $(date -u +%Y-%m-%d)"
          git push
